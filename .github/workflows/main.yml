name: SMTP Mail Test
on:
  schedule:
    - cron: '0 21 * * 4'  # JST 金曜 6:00（UTC木曜21時）
  workflow_dispatch:

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client pandas openpyxl

      # ── STEP 1: Google Drive から Excel をダウンロード ──
      - name: Download Excel from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
        run: |
          python - <<EOF
          import os, io, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          sa_info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
          creds = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=["https://www.googleapis.com/auth/drive.readonly"]
          )
          drive = build("drive", "v3", credentials=creds)

          request = drive.files().get_media(fileId=os.environ["EXCEL_FILE_ID"])
          buffer = io.BytesIO()
          downloader = MediaIoBaseDownload(buffer, request)
          done = False
          while not done:
              _, done = downloader.next_chunk()

          with open("/tmp/data.xlsx", "wb") as f:
              f.write(buffer.getvalue())
          print("Download complete: /tmp/data.xlsx")
          EOF

# ── STEP 2: Pandas で絞り込み・整形 ────────────────
      - name: Process with Pandas
        run: |
          python - <<EOF
          import pandas as pd
          import json
          from datetime import datetime, timedelta

          df = pd.read_excel("/tmp/data.xlsx", sheet_name=0, header=1)

          # 実行日の翌日から7日間
          today    = datetime.today().date()
          start    = today + timedelta(days=1)   # 翌日（土）
          end      = start + timedelta(days=6)   # 7日後（金）
          print(f"抽出範囲: {start} 〜 {end}")

          # 希望納期を日付型に変換して絞り込み
          df["希望納期"] = pd.to_datetime(df["希望納期"], errors="coerce").dt.date
          filtered = df[(df["希望納期"] >= start) & (df["希望納期"] <= end)].copy()

          print(f"該当件数: {len(filtered)}件")

          if len(filtered) == 0:
              with open("/tmp/result.json", "w") as f:
                  json.dump([], f)
              print("該当なし。スキップ。")
              exit(0)

          # 担当者・納入先・希望納期 の組み合わせでグループ化
          groups = []
          for (staff, delivery_to, delivery_date), group in filtered.groupby(["担当者", "納入先", "希望納期"]):
              orders = group["顧客注文番号"].astype(str).tolist()
              details = []
              for _, row in group.iterrows():
                  details.append(
                      str(row['製品詳細']) + " " +
                      str(int(row['数量']))
                  )
              groups.append({
                  "担当者": staff,
                  "注文番号リスト": orders,
                  "希望納期": str(delivery_date),
                  "納入先": delivery_to,
                  "明細リスト": details,
              })

          with open("/tmp/result.json", "w", encoding="utf-8") as f:
              json.dump(groups, f, ensure_ascii=False)
          print(f"Process complete: {len(groups)}グループ → /tmp/result.json")
          EOF

# ── STEP 3: 担当者ごとに個別メール送信 ─────────────
      - name: Send Mail
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          STAFF_MAIL_MAP: ${{ secrets.STAFF_MAIL_MAP }}
        run: |
          python - <<EOF
          import os, smtplib, json
          from email.mime.text import MIMEText

          # 担当者→メールアドレスリスト のマップを構築（複数アドレス対応）
          mail_map = {}
          for line in os.environ["STAFF_MAIL_MAP"].splitlines():
              line = line.strip()
              if "," in line:
                  parts = line.split(",")
                  name  = parts[0].strip()
                  addrs = [a.strip() for a in parts[1:] if a.strip()]
                  mail_map[name] = addrs

          with open("/tmp/result.json", encoding="utf-8") as f:
              groups = json.load(f)

          if len(groups) == 0:
              print("該当なし。メール送信スキップ。")
              exit(0)

          # CCはSMTP_USERを使用
          cc_address = os.environ["SMTP_USER"]

          for g in groups:
              staff       = g["担当者"]
              orders      = g["注文番号リスト"]
              delivery    = g["希望納期"]
              delivery_to = g["納入先"]
              details     = g["明細リスト"]

              to_addresses = mail_map.get(staff)
              if not to_addresses:
                  print("⚠ " + staff + " のメールアドレスが見つかりません。スキップ。")
                  continue

              orders_text  = "\n".join(orders)
              details_text = "\n".join(details)

              subject = "【自動送信】納品のご連絡（注文番号：" + orders[0] + "）"

              mail_body = (
                  staff + "様、\n"
                  "いつもお世話になっております。\n"
                  "MFCテクノロジー伊藤です。\n\n"
                  "下記の通り、納品内容をご連絡いたします。\n"
                  "\n"
                  "■注文番号\n"
                  + orders_text +
                  "\n\n"
                  "■納品予定日\n"
                  + delivery +
                  "\n\n"
                  "■納入先\n"
                  + delivery_to +
                  "\n\n"
                  "■納品内容\n"
                  + details_text +
                  "\n\n"
                  "ご確認のほどよろしくお願いいたします。\n"
                  "※本メールはシステムより自動送信されています。\n"
                  "---"
              )

              try:
                  msg = MIMEText(mail_body, "plain", "utf-8")
                  msg["Subject"] = subject
                  msg["From"]    = os.environ["SMTP_USER"]
                  msg["To"]      = ", ".join(to_addresses)
                  msg["Cc"]      = cc_address

                  all_recipients = to_addresses + [cc_address]

                  port = int(os.environ["SMTP_PORT"])
                  server_addr = os.environ["SMTP_SERVER"]

                  if port == 465:
                      server = smtplib.SMTP_SSL(server_addr, port)
                  else:
                      server = smtplib.SMTP(server_addr, port)

                  server.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
                  server.sendmail(msg["From"], all_recipients, msg.as_string())
                  server.quit()
                  print("送信完了: " + staff + " " + str(to_addresses) + "  注文" + str(len(orders)) + "件")

              except Exception as e:
                  print("Error (" + staff + "): " + str(e))
                  raise
          EOF
