name: SMTP Mail Test
on:
  schedule:
    - cron: '0 23 * * 1'
  workflow_dispatch:

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client pandas openpyxl

      # ── STEP 1: Google Drive から Excel をダウンロード ──
      - name: Download Excel from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EXCEL_FILE_ID: ${{ secrets.EXCEL_FILE_ID }}
        run: |
          python - <<EOF
          import os, io, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          sa_info = json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"])
          creds = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=["https://www.googleapis.com/auth/drive.readonly"]
          )
          drive = build("drive", "v3", credentials=creds)

          request = drive.files().get_media(fileId=os.environ["EXCEL_FILE_ID"])
          buffer = io.BytesIO()
          downloader = MediaIoBaseDownload(buffer, request)
          done = False
          while not done:
              _, done = downloader.next_chunk()

          with open("/tmp/data.xlsx", "wb") as f:
              f.write(buffer.getvalue())
          print("Download complete: /tmp/data.xlsx")
          EOF

# ── STEP 2: Pandas で絞り込み・整形 ────────────────
      - name: Process with Pandas
        run: |
          python - <<EOF
          import pandas as pd
          from datetime import datetime, timedelta

          df = pd.read_excel("/tmp/data.xlsx", sheet_name=0, header=1)

          target_date = (datetime.today() - timedelta(days=3)).date()

          df["希望納期"] = pd.to_datetime(df["希望納期"], errors="coerce").dt.date
          filtered = df[df["希望納期"] == target_date].copy()

          print(f"対象日: {target_date}  該当件数: {len(filtered)}件")

          if len(filtered) == 0:
              pd.DataFrame(columns=["担当者", "本文行"]).to_csv("/tmp/result.tsv", sep="\t", index=False)
              print("該当なし。スキップ。")
              exit(0)

          def format_row(row):
              return (
                  f"{row['顧客注文番号']}_{row['製品コード']} "
                  f"{row['製品詳細']} "
                  f"{int(row['販売単価'])} x {int(row['数量'])} = {int(row['販売価格'])}_"
                  f"{row['希望納期']}_{row['納入先']}"
              )

          filtered["本文行"] = filtered.apply(format_row, axis=1, result_type="reduce")

          filtered[["担当者", "本文行"]].to_csv("/tmp/result.tsv", sep="\t", index=False)
          print("Process complete: /tmp/result.tsv")
          EOF

      # ── STEP 3: 担当者ごとに個別メール送信 ─────────────
      - name: Send Mail
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          STAFF_MAIL_MAP: ${{ secrets.STAFF_MAIL_MAP }}
        run: |
          python - <<EOF
          import os, smtplib
          import pandas as pd
          from email.mime.text import MIMEText
          from datetime import datetime, timedelta

          # 担当者→メールアドレス のマップを構築
          mail_map = {}
          for line in os.environ["STAFF_MAIL_MAP"].splitlines():
              line = line.strip()
              if "," in line:
                  name, address = line.split(",", 1)
                  mail_map[name.strip()] = address.strip()

          df = pd.read_csv("/tmp/result.tsv", sep="\t")

          if len(df) == 0:
              print("該当なし。メール送信スキップ。")
              exit(0)

          target_date = (datetime.today() - timedelta(days=3)).date()

          # 担当者ごとにグループ化して送信
          for staff, group in df.groupby("担当者"):
              to_address = mail_map.get(staff)
              if not to_address:
                  print(f"⚠ {staff} のメールアドレスが見つかりません。スキップ。")
                  continue

              lines = [f"希望納期 {target_date} の納期確認です。\n"]
              for _, row in group.iterrows():
                  lines.append(row["本文行"])
              mail_body = "\n".join(lines)

              try:
                  msg = MIMEText(mail_body, "plain", "utf-8")
                  msg["Subject"] = f"納期確認 {target_date}（{len(group)}件）"
                  msg["From"] = os.environ["SMTP_USER"]
                  msg["To"]   = to_address

                  port = int(os.environ["SMTP_PORT"])
                  server_addr = os.environ["SMTP_SERVER"]

                  if port == 465:
                      server = smtplib.SMTP_SSL(server_addr, port)
                  else:
                      server = smtplib.SMTP(server_addr, port)

                  server.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
                  server.sendmail(msg["From"], [to_address], msg.as_string())
                  server.quit()
                  print(f"送信完了: {staff} <{to_address}>  {len(group)}件")

              except Exception as e:
                  print(f"Error ({staff}): {e}")
                  raise
          EOF
